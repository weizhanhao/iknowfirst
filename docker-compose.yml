services:
  rsshub:
    image: diygod/rsshub:latest
    ports: ["1200:1200"]
    environment:
      NODE_ENV: production
    restart: unless-stopped

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: iknowfirst
      MYSQL_USER: radar
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes: ["mysqldata:/var/lib/mysql"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "radar", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 6

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
      rsshub:
        condition: service_started
    env_file: [.env]
    volumes: ["./config.yaml:/app/config.yaml:ro"]
    restart: unless-stopped

volumes:
  mysqldata:

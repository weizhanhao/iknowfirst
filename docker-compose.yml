services:
  rsshub:
    image: diygod/rsshub:latest
    ports: ["1200:1200"]
    environment:
      NODE_ENV: production
    restart: unless-stopped

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: iknowfirst
      MYSQL_USER: radar
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes: ["mysqldata:/var/lib/mysql"]
    restart: unless-stopped

  app:
    build: .
    depends_on: [rsshub, mysql]
    env_file: [.env]
    volumes: ["./config.yaml:/app/config.yaml:ro"]
    restart: unless-stopped

volumes:
  mysqldata:
